name: Daily Insider Trades Update

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch insider trades
        run: python fetch_trades.py

      - name: Fetch US market insider flow
        run: python fetch_market_flow.py

      - name: Commit & push trades.json and market_flow.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trades.json market_flow.json
          git diff --cached --quiet || git commit -m "chore: update insider data [$(date -u +%Y-%m-%d)]"
          git push
